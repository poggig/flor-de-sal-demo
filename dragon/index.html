<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Chronicles of Azurerune</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace}
#gameContainer{position:relative;width:800px;height:480px}
/* Phaser injects its <canvas> into #gameParent; UI overlays sit on top. */
#gameParent canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#dlg{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:88%;max-width:680px;background:rgba(8,8,30,0.95);border:2px solid #c8a84e;border-radius:6px;padding:14px 18px;color:#f0e6c0;font-size:14px;line-height:1.5;display:none;pointer-events:auto;z-index:10}
#dlg .sp{color:#c8a84e;font-weight:bold;margin-bottom:3px;font-size:12px}
#dlg .tx{min-height:36px}
#dlg .pr{color:#555;font-size:10px;margin-top:6px;text-align:right}
#title{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto;z-index:20;background:linear-gradient(rgba(6,8,26,0.68),rgba(6,8,26,0.82)),url("assets/bg_arena.png");background-size:cover;background-position:center;image-rendering:pixelated}
#title h1{color:#f0d878;font-size:34px;text-shadow:0 2px 0 #000,0 0 22px rgba(200,168,78,0.55);margin-bottom:6px;text-align:center;letter-spacing:1px}
#title h2{color:#bcd6ee;font-size:15px;margin-bottom:28px;font-weight:normal;text-align:center;text-shadow:0 1px 3px #000}
.btn{pointer-events:auto;background:rgba(200,168,78,0.1);border:1px solid #c8a84e;color:#c8a84e;padding:9px 32px;font-family:inherit;font-size:13px;cursor:pointer;margin:4px;border-radius:3px;outline:none}
.btn:hover{background:rgba(200,168,78,0.22)}
.btn:focus{outline:none}
#hud{position:absolute;top:0;left:0;width:100%;padding:5px 8px;display:none;pointer-events:none;z-index:5;gap:5px;align-items:flex-start}
.hs{display:flex;flex-direction:column;align-items:center;pointer-events:auto;cursor:pointer;padding:2px 3px;border-radius:3px;border:2px solid transparent}
.hs.act{border-color:#c8a84e;background:rgba(200,168,78,0.08)}
.hp-bar{width:32px;height:3px;background:#222;border-radius:1px;margin-top:2px}
.hp-fill{height:100%;border-radius:1px;transition:width 0.3s}
.hs .nm{color:#cbb98f;font-size:8px;margin-top:1px;text-shadow:0 1px 2px #000}
.hs .pf{width:28px;height:28px;border-radius:2px;image-rendering:pixelated;object-fit:cover;object-position:center top;display:block}
#hint{position:absolute;bottom:6px;right:9px;color:#e6d8b8;font-size:10px;pointer-events:none;z-index:6;text-shadow:0 1px 2px #000,0 0 5px #000,0 0 5px #000}
/* Generic centered overlay reused for pause / game-over / victory (parity with
   the hand-rolled engine's in-canvas overlays, but as DOM for crisp i18n text
   and trivially assertable headless state). */
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto;z-index:25;text-align:center;background:rgba(6,8,26,0.58)}
#overlay .ot,#overlay .oo,#overlay .credits{text-shadow:0 2px 4px #000,0 0 8px #000}
#overlay .ot{font-size:28px;font-weight:bold;color:#c8a84e;margin-bottom:18px;padding:0 12px}
#overlay .oo{font-size:14px;color:#f0e6c0;margin:5px 0}
#overlay .credits{font-size:13px;color:#8ab4d4;margin-top:6px}
#loadScr{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0a1a;z-index:30}
#loadScr .lt{color:#c8a84e;font-size:14px;margin-bottom:12px}
#loadScr .bar{width:200px;height:6px;background:#1a1a2a;border:1px solid #333;border-radius:3px}
#loadScr .fill{height:100%;background:#c8a84e;border-radius:2px;width:0%;transition:width 0.2s}
</style>
</head>
<body>
<div id="gameContainer">
<div id="gameParent"></div>
<div id="ui">
<div id="loadScr"><div class="lt">Loading Assets...</div><div class="bar"><div class="fill" id="loadBar"></div></div></div>
<div id="title" style="display:none">
<h1>Template Quest</h1>
<h2>Replace me with your game</h2>
<div id="langBtns" style="margin-bottom:12px;display:flex;gap:6px"></div>
<div id="levelBtns" style="display:flex;flex-direction:column;align-items:center"></div>
</div>
<div id="hud"></div>
<div id="overlay"><div class="ot"></div><div class="opts"></div></div>
<div id="dlg"><div class="sp"></div><div class="tx"></div><div class="pr">[SPACE or CLICK]</div></div>
<div id="hint"></div>
</div>
</div>

<!-- VENDORED Phaser 4.2.0 — a plain <script> tag, NO bundler / build step.
     This is the whole point: the game stays single-folder, zero-install,
     zero-build, link-shareable. (DECISIONS E-f) -->
<script src="phaser.min.js"></script>
<!-- engine.js = the sacred, content-agnostic core (Phaser scenes + party/combat/
     dialogue/i18n/pause/victory/timing-hook). data.js + scenes.js ARE the game. -->
<script src="src/engine.js"></script>
<script src="src/data.js"></script>
<script src="strings.js"></script>
<script src="src/modules/map-kit.js"></script>
<script src="src/modules/follow-familiar.js"></script>
<script src="src/modules/fx.js"></script>
<script src="src/modules/boss-taunts.js"></script>
<script src="src/modules/stealth-watchers.js"></script>
<script src="src/scenes.js"></script>
<script src="src/main.js"></script>
</body>
</html>
